name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

concurrency:
  group: life-os-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run validate:tokens
      - run: npm run build

  design-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build -w design-catalog
      - run: npm run test:design-catalog
      - run: npm run test:design-catalog:a11y
      - run: npm run test:design-catalog:snapshots

  integration-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run check:lifeos-boundaries
      - run: ./scripts/test-outbox-trigger.sh
      - name: Remote identity + outbox smoke
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -n "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            VERIFY_SKIP_NETLIFY=1 ./scripts/verify-life-os-identity-p0.sh
            ./scripts/test-outbox-trigger.sh --smoke
          else
            echo "Skip remote smoke — SUPABASE_ACCESS_TOKEN not configured"
          fi
