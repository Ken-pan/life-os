name: Deploy Netlify (manual)

# Optional backup: build in GitHub Actions and upload to Netlify.
# Primary CD is Netlify Git builds from this monorepo (deploy key).
#
# Setup: gh secret set NETLIFY_AUTH_TOKEN -R Ken-pan/life-os

on:
  workflow_dispatch:
    inputs:
      app:
        description: App to deploy
        required: true
        type: choice
        options:
          - planner
          - fitness
          - finance
          - music
          - all

jobs:
  deploy-planner:
    if: ${{ github.event.inputs.app == 'planner' || github.event.inputs.app == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build -w planner-os
      - run: npx netlify deploy --prod --site=82a6cadc-03f9-443c-85f7-26bd4a90f83f --dir=apps/planner/build --functions=apps/planner/netlify/functions
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

  deploy-fitness:
    if: ${{ github.event.inputs.app == 'fitness' || github.event.inputs.app == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build -w fitness-os
      - run: npx netlify deploy --prod --site=0394cf19-7fb7-4fea-81d7-d4a9d025fab3 --dir=apps/fitness/build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

  deploy-finance:
    if: ${{ github.event.inputs.app == 'finance' || github.event.inputs.app == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build -w finance-os
      - run: CI=1 npx netlify deploy --prod --no-build --filter finance-os --site=fc92f305-8dcf-46c3-82f5-ef511597df1c --dir=apps/finance/build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

  deploy-music:
    if: ${{ github.event.inputs.app == 'music' || github.event.inputs.app == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build -w music-os
      - run: npx netlify deploy --prod --no-build --site=83dfdf84-095a-4b8a-955d-106d046a314b --dir=apps/music/build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
