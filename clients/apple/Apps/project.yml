# XcodeGen — Kenos Phase 4A/4B native daily loop (local/dev only).
#   brew install xcodegen && cd clients/apple/Apps && xcodegen
# Bundle IDs are placeholders (KR-P4A-TEMP-005 / KR-P4B-TEMP-005). No App Store / TestFlight / APNs.
name: Kenos
options:
  bundleIdPrefix: space.kenos.app
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    watchOS: "10.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
packages:
  KenosContracts:
    path: ../Packages/KenosContracts
  KenosClient:
    path: ../Packages/KenosClient
  KenosStore:
    path: ../Packages/KenosStore
  KenosActions:
    path: ../Packages/KenosActions
  KenosDesign:
    path: ../Packages/KenosDesign
  KenosNotifications:
    path: ../Packages/KenosNotifications
  KenosHandoff:
    path: ../Packages/KenosHandoff
targets:
  KenosIOS:
    type: application
    platform: iOS
    sources:
      - path: iOS/Sources
      - path: Shared
    info:
      path: iOS/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kenos.app.ios
        PRODUCT_NAME: KenosIOS
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
    dependencies:
      - package: KenosContracts
      - package: KenosClient
      - package: KenosStore
      - package: KenosActions
      - package: KenosDesign
      - package: KenosNotifications
      - package: KenosHandoff
      - target: KenosWatch
        embed: true
      # KenosWidget builds standalone; App Group/signing gate defers host embedding for simulator install
    scheme:
      testTargets:
        - KenosIOSTests

  KenosMac:
    type: application
    platform: macOS
    sources:
      - path: macOS/Sources
      - path: Shared
    info:
      path: macOS/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kenos.app.macos
        PRODUCT_NAME: KenosMac
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    dependencies:
      - package: KenosContracts
      - package: KenosClient
      - package: KenosStore
      - package: KenosActions
      - package: KenosDesign
      - package: KenosNotifications
      - package: KenosHandoff
    scheme:
      testTargets:
        - KenosMacTests

  KenosWatch:
    type: application
    platform: watchOS
    sources:
      - path: watchOS/Sources
    info:
      path: watchOS/Info.plist
      properties:
        CFBundleDisplayName: Kenos
        CFBundleShortVersionString: "0.4.1"
        CFBundleVersion: "1"
        WKApplication: true
        WKCompanionAppBundleIdentifier: space.kenos.app.ios
        CFBundleURLTypes:
          - CFBundleURLName: space.kenos.app
            CFBundleURLSchemes:
              - kenos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kenos.app.ios.watch
        PRODUCT_NAME: KenosWatch
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
    dependencies:
      - package: KenosContracts
      - package: KenosClient
      - package: KenosStore
      - package: KenosActions
      - package: KenosNotifications
      - package: KenosHandoff
    scheme:
      testTargets:
        - KenosWatchTests

  KenosWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Extensions/Widget/Sources
    info:
      path: Extensions/Widget/Info.plist
      properties:
        CFBundleDisplayName: Kenos
        CFBundleShortVersionString: "0.4.1"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kenos.app.ios.widget
        PRODUCT_NAME: KenosWidget
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGNING_ALLOWED: "NO"
        # App Group placeholder only — production group deferred (KR-P4B-TEMP-005)
        # PRODUCT_APP_GROUP = group.space.kenos.app
    dependencies:
      - package: KenosClient
      - package: KenosNotifications

  KenosIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        excludes:
          - KenosWatchGlanceTests.swift
    dependencies:
      - target: KenosIOS
      - package: KenosContracts
      - package: KenosClient
      - package: KenosHandoff
      - package: KenosNotifications
      - package: KenosActions
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kenos.app.ios.tests
        GENERATE_INFOPLIST_FILE: YES

  KenosMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes:
          - KenosWatchGlanceTests.swift
          - KenosCrossDeviceConsistencyTests.swift
    dependencies:
      - target: KenosMac
      - package: KenosClient
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kenos.app.macos.tests
        GENERATE_INFOPLIST_FILE: YES

  KenosWatchTests:
    type: bundle.unit-test
    platform: watchOS
    sources:
      - path: Tests/KenosWatchGlanceTests.swift
      - path: Tests/KenosAppRouteTests.swift
    dependencies:
      - target: KenosWatch
      - package: KenosContracts
      - package: KenosClient
      - package: KenosHandoff
      - package: KenosActions
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kenos.app.ios.watch.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  KenosIOS:
    build:
      targets:
        KenosIOS: all
        KenosWatch: all
        KenosWidget: [build]
        KenosIOSTests: [test]
    test:
      targets:
        - KenosIOSTests
  KenosMac:
    build:
      targets:
        KenosMac: all
        KenosMacTests: [test]
    test:
      targets:
        - KenosMacTests
  KenosWatch:
    build:
      targets:
        KenosWatch: all
        KenosWatchTests: [test]
    test:
      targets:
        - KenosWatchTests
