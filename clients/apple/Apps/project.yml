# XcodeGen — Kenos Phase 4A/4B native daily loop (local/dev only).
#   brew install xcodegen && cd clients/apple/Apps && xcodegen
# Bundle IDs are placeholders (KR-P4A-TEMP-005 / KR-P4B-TEMP-005). No App Store / TestFlight / APNs.
name: Kenos
options:
  bundleIdPrefix: space.kenos.app
  deploymentTarget:
    iOS: '17.0'
    macOS: '14.0'
    watchOS: '10.0'
  createIntermediateGroups: true
settings:
  base:
    # Dogfood Team (same as home-scan / prior KenosIOS device builds).
    DEVELOPMENT_TEAM: 93NJ4CAU8B
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: '6.0'
    CURRENT_PROJECT_VERSION: '1'
    MARKETING_VERSION: '1.0.0'
packages:
  KenosContracts:
    path: ../Packages/KenosContracts
  KenosClient:
    path: ../Packages/KenosClient
  KenosStore:
    path: ../Packages/KenosStore
  KenosActions:
    path: ../Packages/KenosActions
  KenosDesign:
    path: ../Packages/KenosDesign
  KenosNotifications:
    path: ../Packages/KenosNotifications
  KenosHandoff:
    path: ../Packages/KenosHandoff
targets:
  KenosIOS:
    type: application
    platform: iOS
    sources:
      - path: iOS/Sources
        excludes:
          - Health/Resources/**
      - path: iOS/Sources/Health/Resources
        buildPhase: resources
      - path: iOS/Assets.xcassets
      - path: Shared
      # Shared with KenosWidget — ActivityAttributes must match byte-for-byte.
      - path: Extensions/Widget/Sources/KenosLiveActivityAttributes.swift
    info:
      path: iOS/Info.plist
      properties:
        CFBundleDisplayName: Kenos
        CFBundleShortVersionString: '1.0.0'
        CFBundleVersion: '$(CURRENT_PROJECT_VERSION)'
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLName: space.kenos.app.ios
            CFBundleURLSchemes:
              - kenos
        NSUserActivityTypes:
          - space.kenos.app.continuity
        KENOS_DAILY_BETA_ORIGIN: '$(KENOS_DAILY_BETA_ORIGIN)'
        # Publishable Supabase config for native bug report upload (same as apps/*/.env.example).
        KENOS_SUPABASE_URL: 'https://iueozzuctstwvzbcxcyh.supabase.co'
        KENOS_SUPABASE_ANON_KEY: 'sb_publishable_V_BnCiRU9vozOl3VLL8AAg_KsUfDEcL'
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoadsInWebContent: true
          NSExceptionDomains:
            '127.0.0.1':
              NSExceptionAllowsInsecureHTTPLoads: true
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
            local:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
            '10.0.0.0/8':
              NSExceptionAllowsInsecureHTTPLoads: true
            '192.168.0.0/16':
              NSExceptionAllowsInsecureHTTPLoads: true
            '172.16.0.0/12':
              NSExceptionAllowsInsecureHTTPLoads: true
            # Tailscale CGNAT + MagicDNS (preferred Mac↔iPhone pair)
            '100.64.0.0/10':
              NSExceptionAllowsInsecureHTTPLoads: true
            ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        NSBonjourServices:
          - _http._tcp
        LSApplicationQueriesSchemes:
          - x-apple-health
          - homescan
        NSLocalNetworkUsageDescription: >-
          Kenos connects to your paired Mac Daily Beta over Tailscale
          (MagicDNS) or private LAN Bonjour when the cloud shell is unavailable.
        NSHealthShareUsageDescription: >-
          Kenos reads Apple Health metrics you enable (sleep, heart, activity,
          workouts, and more) to power Health status. Data stays on your devices
          and can optionally sync to your Mac.
        NSFaceIDUsageDescription: >-
          Kenos uses Face ID to unlock the app and sensitive Money and Work surfaces
          inside the Continuity shell.
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - space.kenos.app.ios.health.sync
        # Live Activities (Lock Screen + Dynamic Island) — ActivityKit.
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
    entitlements:
      path: iOS/KenosIOS.entitlements
      # HealthKit temporarily removed — wildcard / daily-beta signing cannot
      # carry com.apple.developer.healthkit. Re-add after App ID + Xcode
      # account can refresh a HealthKit Development profile:
      #   com.apple.developer.healthkit: true
      #   com.apple.developer.healthkit.access: []
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kenos.app.ios
        PRODUCT_NAME: KenosIOS
        TARGETED_DEVICE_FAMILY: '1,2'
        GENERATE_INFOPLIST_FILE: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: iOS/KenosIOS.entitlements
        CURRENT_PROJECT_VERSION: '1'
        MARKETING_VERSION: '1.0.0'
        # Emit standalone dSYMs (MetricKit / crash symbolication).
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        # Prefer Tailscale MagicDNS (Mac↔iPhone pair). device-build-install.sh
        # overwrites from ~/.kenos-daily-beta/device-trust.json when present.
        KENOS_DAILY_BETA_ORIGIN: 'http://kens-m5-max-macbook-pro.tail04e0e6.ts.net:5219'
    dependencies:
      - package: KenosContracts
      - package: KenosClient
      - package: KenosStore
      - package: KenosActions
      - package: KenosDesign
      - package: KenosNotifications
      - package: KenosHandoff
      - target: KenosWatch
        embed: true
      - target: KenosWidget
        embed: true
    scheme:
      testTargets:
        - KenosIOSTests

  KenosMac:
    type: application
    platform: macOS
    sources:
      - path: macOS/Sources
      - path: macOS/Assets.xcassets
      - path: Shared
    info:
      path: macOS/Info.plist
      properties:
        CFBundleDisplayName: Kenos
        CFBundleURLTypes:
          - CFBundleURLName: space.kenos.app.macos
            CFBundleURLSchemes:
              - kenos
        KENOS_DAILY_BETA_ORIGIN: '$(KENOS_DAILY_BETA_ORIGIN)'
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoadsInWebContent: true
          NSExceptionDomains:
            '127.0.0.1':
              NSExceptionAllowsInsecureHTTPLoads: true
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
            '100.64.0.0/10':
              NSExceptionAllowsInsecureHTTPLoads: true
            ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kenos.app.macos
        PRODUCT_NAME: KenosMac
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: '$(inherited) @executable_path/../Frameworks'
        KENOS_DAILY_BETA_ORIGIN: 'http://127.0.0.1:5219'
    dependencies:
      - package: KenosContracts
      - package: KenosClient
      - package: KenosStore
      - package: KenosActions
      - package: KenosDesign
      - package: KenosNotifications
      - package: KenosHandoff
    scheme:
      testTargets:
        - KenosMacTests

  KenosWatch:
    type: application
    platform: watchOS
    sources:
      - path: watchOS/Sources
      - path: watchOS/Assets.xcassets
    info:
      path: watchOS/Info.plist
      properties:
        CFBundleDisplayName: Kenos
        CFBundleShortVersionString: '0.4.1'
        CFBundleVersion: '1'
        WKApplication: true
        WKCompanionAppBundleIdentifier: space.kenos.app.ios
        CFBundleURLTypes:
          - CFBundleURLName: space.kenos.app
            CFBundleURLSchemes:
              - kenos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kenos.app.ios.watch
        PRODUCT_NAME: KenosWatch
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SKIP_INSTALL: YES
    dependencies:
      - package: KenosContracts
      - package: KenosClient
      - package: KenosStore
      - package: KenosActions
      - package: KenosNotifications
      - package: KenosHandoff
    scheme:
      testTargets:
        - KenosWatchTests

  KenosWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Extensions/Widget/Sources
    info:
      path: Extensions/Widget/Info.plist
      properties:
        CFBundleDisplayName: Kenos
        CFBundleShortVersionString: '$(MARKETING_VERSION)'
        CFBundleVersion: '$(CURRENT_PROJECT_VERSION)'
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        NSSupportsLiveActivities: true
    entitlements:
      path: Extensions/Widget/KenosWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kenos.app.ios.widget
        PRODUCT_NAME: KenosWidget
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Extensions/Widget/KenosWidget.entitlements
        SKIP_INSTALL: YES
        CURRENT_PROJECT_VERSION: '1'
        MARKETING_VERSION: '1.0.0'
        # App Group dogfood (EXIT_OPEN) — production Team cutover still deferred (KR-P4B-TEMP-005)
        PRODUCT_APP_GROUP: group.space.kenos.app
    dependencies:
      - package: KenosClient
      - package: KenosNotifications

  KenosIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        excludes:
          - KenosWatchGlanceTests.swift
          - KenosMacSidebarTests.swift
    dependencies:
      - target: KenosIOS
      - package: KenosContracts
      - package: KenosClient
      - package: KenosHandoff
      - package: KenosNotifications
      - package: KenosActions
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kenos.app.ios.tests
        GENERATE_INFOPLIST_FILE: YES

  KenosMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes:
          - KenosWatchGlanceTests.swift
          - KenosCrossDeviceConsistencyTests.swift
          - KenosLogTests.swift
          - KenosBugReportTests.swift
          - KenosHealthKitTests.swift
          - KenosHomeScanBridgeTests.swift
          - KenosNativeCapabilityBridgeTests.swift
          - KenosAppIntentsTests.swift
          - KenosSpotlightHandoffTests.swift
          - KenosDailyBetaConfigTests.swift
          - KenosWebWarmupTests.swift
          - KenosWidgetSnapshotTests.swift
          - KenosNowPlayingBridgeTests.swift
          - KenosAssistantDockHideTests.swift
          - KenosCrashReportTests.swift
          - KenosOfflineShellPolicyTests.swift
          - KenosPerfStateReporterTests.swift
          - KenosDomainHomePathTests.swift
          - KenosAppRouteTests.swift
          - KenosShellUnlockTests.swift
          - KenosDeviceIdentityStoreTests.swift
    dependencies:
      - target: KenosMac
      - package: KenosClient
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kenos.app.macos.tests
        GENERATE_INFOPLIST_FILE: YES

  KenosWatchTests:
    type: bundle.unit-test
    platform: watchOS
    sources:
      - path: Tests/KenosWatchGlanceTests.swift
      - path: Tests/KenosAppRouteTests.swift
    dependencies:
      - target: KenosWatch
      - package: KenosContracts
      - package: KenosClient
      - package: KenosHandoff
      - package: KenosActions
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kenos.app.ios.watch.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  KenosIOS:
    build:
      targets:
        KenosIOS: all
        KenosWatch: all
        KenosWidget: [build]
        KenosIOSTests: [test]
    test:
      targets:
        - KenosIOSTests
  KenosMac:
    build:
      targets:
        KenosMac: all
        KenosMacTests: [test]
    test:
      targets:
        - KenosMacTests
  KenosWatch:
    build:
      targets:
        KenosWatch: all
        KenosWatchTests: [test]
    test:
      targets:
        - KenosWatchTests
