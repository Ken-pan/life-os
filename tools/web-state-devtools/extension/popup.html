<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Web State DevTools</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <img src="icons/mark.svg" alt="" class="brand-mark" width="24" height="24" />
        <div>
          <h1>Web State DevTools</h1>
          <p class="subtitle">Capture page structure → localhost bridge → Cursor MCP</p>
        </div>
      </div>
    </header>

    <section class="actions">
      <button id="btn-capture-send" type="button">Capture &amp; Send to Cursor</button>
      <button id="btn-capture" type="button" class="secondary">Capture only</button>
      <button id="btn-send" type="button" class="secondary">Send latest</button>
      <button id="btn-download" type="button" class="secondary">Download JSON</button>
      <button id="btn-summary" type="button" class="secondary">Download summary.md</button>
    </section>

    <section class="dev-mode">
      <label class="toggle">
        <input id="dev-agent-mode" type="checkbox" />
        <span>Dev Agent Mode (Cursor 可控制 Chrome)</span>
      </label>
      <p class="hint">开启后 Service Worker 常驻连接 bridge WebSocket；Cursor 可调用 <code>browser_*</code> 工具（点击、填表、导航、脚本步骤）。无需保持 popup 打开。</p>
    </section>

    <section id="status" class="status info" aria-live="polite">Ready — 在目标页点击本扩展，再点 Capture &amp; Send</section>

    <footer>
      <p>Bridge: <code>http://127.0.0.1:17321</code> · <span id="bridge-status">checking…</span></p>
    </footer>
    <script src="popup.js"></script>
  </body>
</html>
