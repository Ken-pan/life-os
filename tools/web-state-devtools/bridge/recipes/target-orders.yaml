# Target account orders — scroll + capture harvest over a configurable date range.
# The harvest window (--since/--until/--days, default past 365 days) is set in the script,
# which also writes a dated basename: target-orders-<since>_to_<until>-raw.json.
# NOTE: online Orders view only; Target in-store purchase history is not captured yet.
# Run: WEB_STATE_ALLOW_TARGET=1 node scripts/target-harvest-past-year.mjs [--since YYYY-MM-DD] [--until YYYY-MM-DD]

id: target-orders
match:
  urlPattern: 'target.*/orders|target.*/account/orders'

vars:
  year: '2025'
  targetCount: 9999
  scrollRounds: 35

capture:
  action: capture
  fast: true
  minItemsPerPage: 0
  captureTimeoutMs: 45000
  navigateTimeoutMs: 90000
  wait:
    selectors:
      - 'a[aria-label^="View purchase made on"]'
      - 'main'
    minCount: 1
    stableMs: 400
    timeoutMs: 15000

entities:
  kind: list
  source: adapter
  mergeKey: ['detailUrl:/orders/([^/?#]+)', 'orderId']

export:
  outDir: target-export
  # Fallback basename only; the harvest script writes a dated basename
  # (target-orders-<since>_to_<until>) and consumers resolve the newest raw file.
  basename: 'target-orders'
  formats: [json, csv]
  redact: [shipTo, address]

follow:
  enabled: true
  field: detailUrl
  max: 40
  whenMissing: [lineItems]
  wait:
    selectors:
      - 'button[aria-label^="item details for "]'
      - 'main h3'
    minCount: 1
    stableMs: 400
    timeoutMs: 15000
