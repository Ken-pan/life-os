# Amazon Your Orders — element-ready capture (no fixed sleep / no network idle)
# Run: WEB_STATE_ALLOW_AMAZON=1 node scripts/run-recipe.mjs amazon-orders

id: amazon-orders
match:
  urlPattern: 'amazon.*/your-orders|amazon.*/order-history'

vars:
  year: '2026'
  targetCount: 187

pagination:
  strategy: startIndex
  param: startIndex
  step: 10
  max: 220
  baseUrlTemplate: 'https://www.amazon.com/your-orders/orders?timeFilter=year-{year}&ref_=ppx_yo2ov_dt_b_filter_all_y{year}'

capture:
  action: capture
  fast: true
  minItemsPerPage: 1
  captureTimeoutMs: 45000
  navigateTimeoutMs: 60000
  wait:
    selectors:
      - '.order-card.js-order-card'
      - 'a[href*="order-details"][href*="orderID="]'
      - 'img[src*="media-amazon.com/images/I/"]'
    minCount: 1
    stableMs: 300
    timeoutMs: 12000
    requirePrice: true

entities:
  kind: list
  source: adapter
  mergeKey: ['detailUrl:orderID=([^&]+)', orderId]

export:
  outDir: amazon-export
  basename: 'amazon-orders-{year}'
  formats: [json, csv]
  redact: [shipTo, address]

follow:
  enabled: true
  field: detailUrl
  max: 30
  whenMissing: [orderTotal, lineItems]
  wait:
    selectors:
      - '#orderDetails a[href*="fed_asin_title"]'
      - '#od-subtotals'
      - 'img[src*="media-amazon.com/images/I/"]'
    minCount: 2
    stableMs: 300
    timeoutMs: 12000
