# Best Buy purchase history — scroll + capture harvest over a configurable date range.
# The harvest window (--since/--until/--days, default past 365 days) is set in the script,
# which also writes a dated basename: bestbuy-orders-<since>_to_<until>-raw.json.
# Run: WEB_STATE_ALLOW_BESTBUY=1 node scripts/bestbuy-harvest-past-year.mjs [--since YYYY-MM-DD] [--until YYYY-MM-DD]

id: bestbuy-orders
match:
  urlPattern: 'bestbuy.*/purchasehistory|bestbuy.*/profile/ss/orders'

vars:
  year: '2025'
  targetCount: 9999
  scrollRounds: 35

capture:
  action: capture
  fast: true
  minItemsPerPage: 0
  captureTimeoutMs: 45000
  navigateTimeoutMs: 90000
  wait:
    selectors:
      ['[data-testid="order-item"]', '[data-testid="virtuoso-item-list"]']
    minCount: 1
    stableMs: 400
    timeoutMs: 15000

entities:
  kind: list
  source: adapter
  mergeKey: ['orderId', 'detailUrl:order-details/([^/]+)/view']

export:
  outDir: bestbuy-export
  # Fallback basename only; the harvest script writes a dated basename
  # (bestbuy-orders-<since>_to_<until>) and consumers resolve the newest raw file.
  basename: 'bestbuy-orders'
  formats: [json, csv]
  redact: [shipTo, address]

follow:
  enabled: true
  field: detailUrl
  max: 60
  whenMissing: [lineItems]
  wait:
    selectors:
      - 'a[id^="line-item-header-"]'
      - '.order-details-page'
      - 'img[src*="bbystatic.com"]'
    minCount: 1
    stableMs: 500
    timeoutMs: 18000
