# Best Buy purchase history — scroll + capture harvest (past year filter in script)
# Run: WEB_STATE_ALLOW_BESTBUY=1 node scripts/bestbuy-harvest-past-year.mjs

id: bestbuy-orders
match:
  urlPattern: 'bestbuy.*/purchasehistory|bestbuy.*/profile/ss/orders'

vars:
  year: '2025'
  targetCount: 9999
  scrollRounds: 35

capture:
  action: capture
  fast: true
  minItemsPerPage: 0
  captureTimeoutMs: 45000
  navigateTimeoutMs: 90000
  wait:
    selectors:
      ['[data-testid="order-item"]', '[data-testid="virtuoso-item-list"]']
    minCount: 1
    stableMs: 400
    timeoutMs: 15000

entities:
  kind: list
  source: adapter
  mergeKey: ['orderId', 'detailUrl:order-details/([^/]+)/view']

export:
  outDir: bestbuy-export
  basename: 'bestbuy-orders-past-year'
  formats: [json, csv]
  redact: [shipTo, address]

follow:
  enabled: true
  field: detailUrl
  max: 60
  whenMissing: [lineItems]
  wait:
    selectors:
      - 'a[id^="line-item-header-"]'
      - '.order-details-page'
      - 'img[src*="bbystatic.com"]'
    minCount: 1
    stableMs: 500
    timeoutMs: 18000
