# Robinhood finance capture — holdings list + optional stock detail
# Live verify: WEB_STATE_ALLOW_ROBINHOOD=1 node scripts/verify-robinhood-sample.mjs

id: robinhood-finance
match:
  urlPattern: 'robinhood\\.com'

capture:
  action: capture
  fast: false
  wait:
    selectors:
      - '[data-testid="PositionCell"]'
      - '[data-testid="VirtualizedSidebar"]'
      - '.caption-text'
      - 'table.table'
    minCount: 1
    stableMs: 800
    timeoutMs: 25000

entities:
  kind: page
  source: adapter

follow:
  enabled: false
