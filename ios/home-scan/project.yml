# HomeScan · HomeOS 的 iOS 扫描伴侣应用（RoomPlan → Supabase → HomeOS 网页端）
# 生成工程:xcodegen generate（.xcodeproj 不入库）
# 真机部署:在 Xcode 里选自己的 Team(Signing & Capabilities),或设 DEVELOPMENT_TEAM
name: HomeScan
options:
  bundleIdPrefix: space.kenos
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.5.0
targets:
  HomeScan:
    type: application
    platform: iOS
    sources: [HomeScan]
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kenos.homescan
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 93NJ4CAU8B
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
        INFOPLIST_KEY_UILaunchScreen_Generation: true
    info:
      path: HomeScan/Info.plist
      properties:
        CFBundleDisplayName: HomeScan
        NSCameraUsageDescription: 扫描房间结构与拍摄机位照片需要使用相机
        NSLocationWhenInUseUsageDescription: 记录住址经纬度与朝向,供平面图的阳光模拟计算太阳角度;只随扫描上传,不做任何追踪
        UIRequiredDeviceCapabilities: [arkit]
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
        # Kenos Domain Continuity → companion deep links (scan / find / container).
        CFBundleURLTypes:
          - CFBundleURLName: space.kenos.homescan
            CFBundleURLSchemes: [homescan]
        # 全屏启动修复(别再从 Info.plist 手改!):xcodegen 每次 generate 都按这份
        # properties 重写 HomeScan/Info.plist 物理文件,不在这里列的 key 会被冲掉 ——
        # 上一版直接手改物理文件加的 UILaunchScreen,装机一跑 xcodegen generate 就被
        # 抹了,App 退回旧屏幕兼容模式(居中缩小、四周黑边)。真源必须在这。
        # （build settings 里的 INFOPLIST_KEY_UILaunchScreen_Generation 对显式 info.path
        # 不生效，勿再指望它。）
        UILaunchScreen: {}
  HomeScanTests:
    type: bundle.unit-test
    platform: iOS
    sources: [HomeScanTests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: HomeScan
