[build]
  command = "npm run build -w portal"
  publish = "build"
  ignore = "bash ./scripts/netlify-ignore-if-changed.sh apps/portal packages/theme packages/sync packages/contracts packages/platform-web"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "apps/portal/.netlify/functions-internal"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
