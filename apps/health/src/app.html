<!DOCTYPE html>
<html lang="zh-CN" data-app="health" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Korben Health</title>
  <meta name="description" content="Korben Health" />
  <meta name="application-name" content="Korben Health" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="color-scheme" content="light dark" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#f4f4f3" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0d0d0e" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#0d0d0e" id="theme-color-meta" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Health" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    (function () {
      try {
        var pref = 'dark';
        var raw = localStorage.getItem('healthos_v1');
        if (raw) {
          var s = JSON.parse(raw);
          if (s.settings && s.settings.theme) pref = s.settings.theme;
        }
        // Korben Shell 下发的主题优先 —— iOS 壳的 user script 在 .atDocumentStart
        // 注入(早于本脚本),让所有 Domain 在同一台设备上保持同一套配色。
        // 壳外(普通浏览器)两个值都不存在,下面沿用本 app 原有逻辑。
        var shellPref =
          window.__KENOS_SHELL_THEME__ || document.documentElement.dataset.kenosShellTheme;
        if (shellPref === 'light' || shellPref === 'dark' || shellPref === 'auto') pref = shellPref;
        var light =
          pref === 'light' ||
          (pref === 'auto' && window.matchMedia('(prefers-color-scheme: light)').matches);
        var resolved = light ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', resolved);
        document.documentElement.style.colorScheme = resolved;
        var meta = document.getElementById('theme-color-meta');
        if (meta) meta.content = resolved === 'light' ? '#f4f4f3' : '#0d0d0e';
      } catch (e) {}
    })();
    (function () {
      var pwaSim = /(?:^|[?&])pwa_sim=1(?:&|$)/.test(location.search);
      var standalone =
        pwaSim ||
        window.matchMedia('(display-mode: standalone)').matches ||
        (window.navigator && window.navigator.standalone === true);
      document.documentElement.classList.toggle('standalone-pwa', standalone);
      var vh = standalone
        ? '100vh'
        : ((window.visualViewport && window.visualViewport.height) || window.innerHeight) + 'px';
      document.documentElement.style.setProperty('--app-vh', vh);
      if (standalone) {
        document.documentElement.style.setProperty('--safe-top-effective', '59px');
      }
    })();
  </script>
  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
