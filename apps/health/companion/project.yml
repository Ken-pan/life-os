# XcodeGen 规范 —— 一条命令生成 HealthOS Companion.xcodeproj。
#   brew install xcodegen && cd apps/health/companion && xcodegen
# 然后 open HealthOSCompanion.xcodeproj,选自己的开发团队(签名)即可 Build 到设备。
#
# ⚠️ Info.plist 与 *.entitlements 由本文件的 properties 生成(唯一源)——别手改生成物,
# 改这里再 xcodegen。生成的 .xcodeproj / Info.plist / *.entitlements 都是构建产物(gitignore)。
name: HealthOSCompanion
options:
  bundleIdPrefix: space.kenos.healthos
  deploymentTarget:
    iOS: "16.0"
    watchOS: "9.0"
settings:
  base:
    DEVELOPMENT_TEAM: "" # ← 填你的 Apple 开发者 Team ID,或在 Xcode 里选 Team
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  HealthOSCompanion:
    type: application
    platform: iOS
    sources:
      - path: iOS
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kenos.healthos.companion
    info:
      path: iOS/Info.plist
      properties:
        CFBundleDisplayName: HealthOS
        UILaunchScreen: {}
        NSHealthShareUsageDescription: "HealthOS 读取你的睡眠、心率、HRV 和活动量,自动推导当前状态,无需手动记录。数据只在你的设备与 Mac 之间同步。"
        UIBackgroundModes: [fetch, processing]
        BGTaskSchedulerPermittedIdentifiers: [space.kenos.healthos.sync]
    entitlements:
      path: iOS/HealthOSCompanion.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.icloud-container-identifiers: [iCloud.space.kenos.healthos]
        com.apple.developer.icloud-services: [CloudDocuments]
        com.apple.developer.ubiquity-container-identifiers: [iCloud.space.kenos.healthos]
    dependencies:
      - target: HealthOSWatch

  HealthOSWatch:
    type: application
    platform: watchOS
    sources:
      - path: Watch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: space.kenos.healthos.companion.watchkitapp
    info:
      path: Watch/Info.plist
      properties:
        CFBundleDisplayName: HealthOS
        WKApplication: true
        WKCompanionAppBundleIdentifier: space.kenos.healthos.companion
        NSHealthShareUsageDescription: "HealthOS 读取你的睡眠、心率、HRV 和活动量,自动推导当前状态。"
    entitlements:
      path: Watch/HealthOSWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.icloud-container-identifiers: [iCloud.space.kenos.healthos]
        com.apple.developer.icloud-services: [CloudDocuments]
        com.apple.developer.ubiquity-container-identifiers: [iCloud.space.kenos.healthos]
