[build]
  command = "npm run build -w planner-os"
  publish = "apps/planner/build"
  ignore = "bash ./scripts/netlify-ignore-if-changed.sh apps/planner packages/theme packages/sync"

[build.environment]
  NODE_VERSION = "22"

[functions]
  # Resolved from the repository base directory, although this config is
  # selected through the apps/planner package directory.
  directory = "apps/planner/netlify/functions"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/_app/immutable/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# api-plan 通过 export const config.path 直接挂载 /api/ai/plan，无需 rewrite
# API routes and SPA catch-all are defined in static/_redirects (processed before netlify.toml)
