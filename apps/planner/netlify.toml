[build]
  command = "npm run build -w planner-os"
  publish = "apps/planner/build"
  ignore = "bash ./scripts/netlify-ignore-if-changed.sh apps/planner packages/theme packages/sync"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "apps/planner/netlify/functions"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/_app/immutable/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ai-plan 通过 export const config.path 直接挂载 /api/ai/plan，无需 rewrite

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
