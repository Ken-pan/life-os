[build]
  command = "npm run build -w planner-os"
  publish = "apps/planner/build"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/planner packages/theme packages/sync"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "apps/planner/netlify/functions"

[[redirects]]
  from = "/api/ai/plan"
  to = "/.netlify/functions/ai-plan"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
