[build]
  command = "npm run build -w fitness-os"
  publish = "apps/fitness/build"
  ignore = "bash ./scripts/netlify-ignore-if-changed.sh apps/fitness packages/contracts packages/platform-web packages/sync packages/theme"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
