# AIOS 云端版(Netlify)
# 本地优先:有可达 LocalAI 网关时走本机全功能;网关不可达时经 /api/ai/chat
# 回退到 Moonshot/Kimi(需站点 env KIMI_API_KEY)。VITE_AIOS_CLOUD=1 启用云端文案与登录门禁。

[build]
  command = "npm run build -w aios-os"
  publish = "apps/aios/build"
  ignore = "bash ./scripts/netlify-ignore-if-changed.sh apps/aios packages/contracts packages/platform-web packages/sync packages/theme"

[build.environment]
  NODE_VERSION = "22"
  VITE_AIOS_CLOUD = "1"

[functions]
  directory = "apps/aios/netlify/functions"

[dev]
  command = "npm run dev -w aios-os"
  targetPort = 5197
  port = 8890
  publish = "apps/aios/build"
  autoLaunch = false

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/_app/immutable/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# SPA catch-all lives in static/_redirects (same pattern as planner).
# /api/ai/chat is mounted by netlify/functions/ai-chat.mjs (export config.path).
