<!DOCTYPE html>
<html lang="zh-CN" data-app="aios" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Korben</title>
  <meta name="description" content="Korben Today and Assistant" />
  <meta name="application-name" content="Korben" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="color-scheme" content="light dark" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#212121" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#212121" id="theme-color-meta" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Korben" />
  <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    // LAN Daily Beta (http://10.x / http://192.168.x) is not a secure context —
    // crypto.randomUUID is missing and SvelteKit boots into "500 Internal Error".
    (function () {
      try {
        if (typeof crypto !== 'undefined' && typeof crypto.randomUUID !== 'function') {
          crypto.randomUUID = function () {
            var bytes = new Uint8Array(16);
            if (crypto.getRandomValues) crypto.getRandomValues(bytes);
            else for (var i = 0; i < 16; i++) bytes[i] = (Math.random() * 256) | 0;
            bytes[6] = (bytes[6] & 0x0f) | 0x40;
            bytes[8] = (bytes[8] & 0x3f) | 0x80;
            var hex = [];
            for (var j = 0; j < 16; j++) hex.push((bytes[j] + 0x100).toString(16).slice(1));
            return (
              hex.slice(0, 4).join('') +
              '-' +
              hex.slice(4, 6).join('') +
              '-' +
              hex.slice(6, 8).join('') +
              '-' +
              hex.slice(8, 10).join('') +
              '-' +
              hex.slice(10, 16).join('')
            );
          };
        }
      } catch (e) { }
    })();
    (function () {
      try {
        var pref = 'dark';
        var raw = localStorage.getItem('aiosos_v1');
        if (raw) {
          var s = JSON.parse(raw);
          if (s.settings && s.settings.theme) pref = s.settings.theme;
        }
        // Korben Shell 下发的主题优先 —— iOS 壳的 user script 在 .atDocumentStart
        // 注入(早于本脚本),让所有 Domain 在同一台设备上保持同一套配色。
        // 壳外(普通浏览器)两个值都不存在,下面沿用本 app 原有逻辑。
        var shellPref =
          window.__KENOS_SHELL_THEME__ || document.documentElement.dataset.kenosShellTheme;
        if (shellPref === 'light' || shellPref === 'dark' || shellPref === 'auto') pref = shellPref;
        var light =
          pref === 'light' ||
          (pref === 'auto' && window.matchMedia('(prefers-color-scheme: light)').matches);
        var resolved = light ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', resolved);
        document.documentElement.style.colorScheme = resolved;
        var meta = document.getElementById('theme-color-meta');
        if (meta) meta.content = resolved === 'light' ? '#ffffff' : '#212121';
      } catch (e) { }
    })();
    (function () {
      var pwaSim = /(?:^|[?&])pwa_sim=1(?:&|$)/.test(location.search);
      var standalone =
        pwaSim ||
        window.matchMedia('(display-mode: standalone)').matches ||
        (window.navigator && window.navigator.standalone === true);
      document.documentElement.classList.toggle('standalone-pwa', standalone);
      var vh = standalone
        ? '100vh'
        : ((window.visualViewport && window.visualViewport.height) || window.innerHeight) + 'px';
      document.documentElement.style.setProperty('--app-vh', vh);
      if (standalone) {
        document.documentElement.style.setProperty('--safe-top-effective', '59px');
      }
    })();
  </script>
  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
