<!DOCTYPE html>
<html lang="zh-CN" data-app="finance" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FINANCE.OS</title>
  <meta name="description" content="个人财务驾驶舱 · 现金流、资产与长期规划" />
  <meta name="application-name" content="FINANCE.OS" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="color-scheme" content="light dark" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#f2f4f2" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#101211" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f2f4f2" id="theme-color-meta" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="FINANCE.OS" />
  <meta property="og:title" content="FINANCE.OS" />
  <meta property="og:description" content="个人财务驾驶舱 · 现金流、资产与长期规划" />
  <meta property="og:locale" content="zh_CN" />
  <meta property="og:locale:alternate" content="en_US" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="FINANCE.OS" />
  <meta name="twitter:description" content="个人财务驾驶舱 · 现金流、资产与长期规划" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FINANCE.OS" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/assets/brand/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="icon" href="/assets/brand/favicon-16.png" sizes="16x16" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/brand/apple-touch-icon.png" />
  <script>
    (function () {
      try {
        var stored = localStorage.getItem("fos-theme");
        var dark =
          stored === "dark" ||
          (!stored && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) {
          document.documentElement.setAttribute("data-theme", "dark");
          document.documentElement.style.colorScheme = "dark";
        }
        var meta = document.getElementById("theme-color-meta");
        if (meta) meta.content = dark ? "#101211" : "#f2f4f2";
      } catch (e) {
        /* ignore */
      }
    })();
    (function () {
      var standalone =
        window.matchMedia("(display-mode: standalone)").matches ||
        (window.navigator && window.navigator.standalone === true);
      document.documentElement.classList.toggle("standalone-pwa", standalone);
      var vh = standalone
        ? "100vh"
        : ((window.visualViewport && window.visualViewport.height) || window.innerHeight) + "px";
      document.documentElement.style.setProperty("--app-vh", vh);
      if (standalone) {
        document.documentElement.style.setProperty("--safe-top-effective", "59px");
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
