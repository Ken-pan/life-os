[build]
  command = "npm run build -w finance-os"
  publish = "apps/finance/dist"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/finance packages/theme packages/sync"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/api/stooq/*"
  to = "https://stooq.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/news/*"
  to = "https://news.google.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/ychart/*"
  to = "https://query1.finance.yahoo.com/:splat"
  status = 200
  force = true
  headers = { User-Agent = "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)" }

[[redirects]]
  from = "/legacy"
  to = "/legacy/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
