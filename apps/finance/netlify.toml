[build]
  command = "npm run build -w finance-os"
  publish = "apps/finance/build"
  ignore = "bash ./scripts/netlify-ignore-if-changed.sh apps/finance packages/contracts packages/finance-core packages/finance-enrichment-contract packages/platform-web packages/sync packages/theme"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/_app/immutable/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/api/news/*"
  to = "https://news.google.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/ychart/*"
  to = "https://query1.finance.yahoo.com/:splat"
  status = 200
  force = true
  headers = { User-Agent = "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)" }

[[redirects]]
  from = "/legacy"
  to = "/legacy/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
