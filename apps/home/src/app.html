<!DOCTYPE html>
<html lang="zh-CN" data-app="home" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Korben Home</title>
  <meta name="description" content="居家空间规划 · 户型、东西放哪、今天整理什么" />
  <meta name="application-name" content="Korben Home" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#eef1f4" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#14181c" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#eef1f4" id="theme-color-meta" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Home" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <script>
    (function () {
      try {
        var pref = 'auto';
        var raw = localStorage.getItem('homeos_spatial_v1');
        if (raw) {
          var s = JSON.parse(raw);
          if (s.settings && s.settings.theme) pref = s.settings.theme;
        }
        // Korben Shell 下发的主题优先 —— iOS 壳的 user script 在 .atDocumentStart
        // 注入(早于本脚本),让所有 Domain 在同一台设备上保持同一套配色。
        // 壳外(普通浏览器)两个值都不存在,下面沿用本 app 原有逻辑。
        var shellPref =
          window.__KENOS_SHELL_THEME__ || document.documentElement.dataset.kenosShellTheme;
        if (shellPref === 'light' || shellPref === 'dark' || shellPref === 'auto') pref = shellPref;
        var light =
          pref === 'light' ||
          (pref === 'auto' && window.matchMedia('(prefers-color-scheme: light)').matches);
        var resolved = light ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', resolved);
        document.documentElement.style.colorScheme = resolved;
        var meta = document.getElementById('theme-color-meta');
        if (meta) meta.content = resolved === 'light' ? '#eef1f4' : '#14181c';
      } catch (e) {}
    })();
    (function () {
      var pwaSim = /(?:^|[?&])pwa_sim=1(?:&|$)/.test(location.search);
      var standalone =
        pwaSim ||
        window.matchMedia('(display-mode: standalone)').matches ||
        (window.navigator && window.navigator.standalone === true);
      document.documentElement.classList.toggle('standalone-pwa', standalone);
      var vh = standalone
        ? '100vh'
        : ((window.visualViewport && window.visualViewport.height) || window.innerHeight) + 'px';
      document.documentElement.style.setProperty('--app-vh', vh);
      if (standalone) {
        document.documentElement.style.setProperty('--safe-top-effective', '59px');
      }
    })();
  </script>
  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
