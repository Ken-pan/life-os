[build]
  command = "npm run build -w home-os"
  publish = "apps/home/build"
  ignore = "bash ./scripts/netlify-ignore-if-changed.sh apps/home packages/contracts packages/platform-web packages/sync packages/theme"

[build.environment]
  NODE_VERSION = "22"

[functions]
  # Git 构建相对 repo 根；CLI --filter home-os 时用 netlify/functions（见 docs/ops/netlify.md）
  directory = "apps/home/netlify/functions"

# mcp.js 通过 export const config.path 挂载 /api/mcp（HOME.MCP.13），无需 rewrite

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/_app/immutable/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
