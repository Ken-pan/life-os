<!DOCTYPE html>
<html lang="zh-CN" data-app="music" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MUSIC.OS</title>
  <meta name="description" content="本地与云端音乐 · 离线播放、歌单与私有云备份" />
  <meta name="application-name" content="MUSIC.OS" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="color-scheme" content="light dark" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#faf5f4" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#100a0c" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#faf5f4" id="theme-color-meta" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MUSIC.OS" />
  <meta property="og:title" content="MUSIC.OS" />
  <meta property="og:description" content="本地与云端音乐 · 离线播放、歌单与私有云备份" />
  <meta property="og:locale" content="zh_CN" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="MUSIC.OS" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MUSIC.OS" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png" />
  <link rel="icon" href="/icon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    (function () {
      try {
        var pref = 'auto';
        var raw = localStorage.getItem('musicos_v1');
        if (raw) {
          var s = JSON.parse(raw);
          if (s.settings && s.settings.theme) pref = s.settings.theme;
        }
        var dark = pref === 'dark' ||
          (pref === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var resolved = dark ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', resolved);
        document.documentElement.style.colorScheme = resolved;
        var meta = document.getElementById('theme-color-meta');
        if (meta) meta.content = resolved === 'dark' ? '#100a0c' : '#faf5f4';
      } catch (e) {}
    })();
    (function () {
      var h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
      document.documentElement.style.setProperty('--app-vh', h + 'px');
      var standalone =
        window.matchMedia('(display-mode: standalone)').matches ||
        (window.navigator && window.navigator.standalone === true);
      document.documentElement.classList.toggle('standalone-pwa', standalone);
    })();
  </script>
  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>
</html>
