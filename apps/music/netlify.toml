[build]
  command = "npm run build -w music-os"
  publish = "apps/music/build"
  ignore = "bash ./scripts/netlify-ignore-if-changed.sh apps/music packages/capacitor-nowplaying packages/contracts packages/platform-web packages/sync packages/theme"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "apps/music/netlify/functions"

# lyrics-fetch 通过 export const config.path 直接挂载 /api/lyrics/fetch，无需 rewrite

[dev]
  command = "npm run dev -w music-os"
  targetPort = 5189
  port = 8888
  publish = "apps/music/build"
  autoLaunch = false

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/_app/immutable/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
