[build]
  command = "npm run build -w music-os"
  publish = "apps/music/build"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/music packages/theme packages/sync"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "apps/music/netlify/functions"

# lyrics-fetch 通过 export const config.path 直接挂载 /api/lyrics/fetch，无需 rewrite

[dev]
  command = "npm run dev -w music-os"
  targetPort = 5189
  port = 8888
  publish = "apps/music/build"
  autoLaunch = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
